meta:
  source_chapters: 3
  scene_count: 11
title: 孤鹰岭信物
logline: 女侠苏窈携密信寻沈砚，共赴孤鹰岭揭穿铁面人真身与背叛真相。
style: 电影
characters:
- name: 沈砚
  aliases:
  - 沈三郎
  description: 一名追查旧案线索而来到临川镇的青衫男子，腰佩长剑，沉默寡言。
- name: 苏窈
  aliases: []
  description: 一名怀抱油纸伞的青衣少女，为寻找失踪兄长而来临川镇，提及兄长最后线索指向黑风寨。
- name: 铁面人
  aliases:
  - 黑风寨的人
  - 苏窈的兄长
  description: 夜闯客栈后巷的黑影，脸上覆着半张铁面具，怀揣青铜令牌，与沈砚交手后遁走。
scenes:
- id: S1
  heading:
    int_ext: 内
    location: 听雨楼客栈大堂
    time_of_day: 黄昏
  summary: 苏窈冒雨入客栈，向沈砚借座；两人初遇。
  action:
  - 雨声密集，敲打瓦顶。油灯昏黄，人影晃动。
  - 沈砚独坐角落木桌，青衫湿痕深浅不一，发梢滴水在桌面洇开小片深色。
  - 他右手搭在斜倚桌沿的长剑鞘上，左手端一碗浊酒，碗沿停在唇边三寸，未饮。
  - 几桌外，旅人裹着湿衣争抢炭盆，咳嗽声、碗筷磕碰声混在雨声里。
  - 一道青影逆光立于沈砚桌前，油纸伞尖垂落水珠，滴在青砖地上——嗒、嗒。
  dialogue:
  - character: 苏窈
    parenthetical: 清亮，略带试探
    line: 客官，借个座可好？
  - character: 沈砚
    parenthetical: 目光抬至她眉眼，随即垂落回酒碗
    line: 请便。
  transition: ""
  source:
    chapter: 1
    excerpt: '"客官，借个座可好？"一个清亮的女声响起。沈砚抬头，见一名青衣少女立在桌前，手中抱着一把油纸伞，眉眼间带着几分倔强。'
  craft:
    objective: 苏窈需要一个干燥座位安顿自己并观察环境。
    conflict: 沈砚的沉默与周身疏离感形成无形屏障，桌上未动的酒碗与按剑的手暗示拒绝靠近。
    turn: 沈砚抬眼确认她面容后默许，伞尖水珠落地声成为两人之间第一个共享的节奏。
    function: SETUP
- id: S2
  heading:
    int_ext: 内
    location: 听雨楼客栈大堂
    time_of_day: 黄昏
  summary: 苏窈自报姓名与来意；沈砚反应细微但警觉。
  action:
  - 苏窈将油纸伞靠墙立稳，伞面水珠顺竹骨滑落，在青砖上连成细线。
  - 她坐下时袖口微掀，露出腕骨处一道浅淡旧疤。
  - 沈砚目光扫过那道疤，指尖在酒碗边缘缓缓摩挲一圈。
  - 窗外一道惨白闪电劈下，瞬间照亮他眼中一闪而过的锐利。
  - 雷声轰然炸响，震得窗棂嗡鸣，桌上油灯火苗猛跳两下。
  dialogue:
  - character: 苏窈
    parenthetical: 直视沈砚，下巴微扬
    line: 我叫苏窈。
  - character: 苏窈
    parenthetical: 语速放慢，字字清晰
    line: 来找我兄长。
  transition: ""
  source:
    chapter: 1
    excerpt: 少女自称苏窈，是来寻找失踪兄长的。她说兄长半月前来此镇后便音讯全无，最后一封信里只提到一个名字——"黑风寨"。
  craft:
    objective: 苏窈要建立可信身份，为后续求助铺路。
    conflict: 沈砚对‘失踪兄长’这一信息本能警惕——他正追查同一关键词，却无法判断对方是线索还是陷阱。
    turn: 闪电映出沈砚眼中锐利，他握碗指节微微泛白，酒液表面震出细密涟漪。
    function: REVEAL_CHARACTER
- id: S3
  heading:
    int_ext: 内
    location: 听雨楼客栈大堂
    time_of_day: 黄昏
  summary: 苏窈出示关键信件，点明‘黑风寨’；沈砚以动作回应，情绪破冰。
  action:
  - 苏窈从怀中取出一封半潮的信笺，纸角卷曲，墨迹被水晕开几处。
  - 她将信推至桌沿，指尖在‘黑风寨’三字上轻轻一点。
  - 沈砚左手仍端着酒碗，右手食指无声叩击剑鞘三下——笃、笃、笃。
  - 雷声余震未消，檐角积水砸落青砖：啪。
  - 他喉结上下一滚，终于将那碗酒仰头饮尽。
  dialogue:
  - character: 苏窈
    parenthetical: 声音压低，目光未移
    line: 他半月前来临川，再没回去。
  - character: 苏窈
    parenthetical: 指尖点纸，力道加重
    line: 信里只写了三个字——黑风寨。
  transition: ""
  source:
    chapter: 1
    excerpt: 她说兄长半月前来此镇后便音讯全无，最后一封信里只提到一个名字——"黑风寨"。
  craft:
    objective: 苏窈要迫使沈砚承认‘黑风寨’与自己目标的关联。
    conflict: 沈砚必须在暴露自身目的与错失关键线索间抉择，叩剑是压抑的应激反应。
    turn: 他饮尽浊酒——动作打破僵持，暗示合作可能开启，也暴露此事已刺穿他刻意维持的冷静。
    function: ESCALATE_CONFLICT
- id: S4
  heading:
    int_ext: 内
    location: 听雨楼客栈沈砚客房
    time_of_day: 午夜
  summary: 沈砚被异响惊醒，循声追出。
  action:
  - 窗外雨声渐弱。一盏残烛将熄未熄，灯芯噼啪爆裂。
  - 沈砚猛然睁眼，耳廓微动——远处传来急促、湿滑的足音，由近及远，踏碎青石板上的积水。
  - 他赤脚落地，无声掠至窗边，掀开一条窗缝。月光斜切进屋，照见他腰间长剑未出鞘，但右手已按在剑柄上。
  - 他推窗翻出，衣角掠过窗棂，人已消失在檐下阴影里。
  dialogue: []
  transition: ""
  source:
    chapter: 2
    excerpt: 子时刚过，雨势稍歇。沈砚被一阵急促的脚步声惊醒，他翻身下床，循声追至客栈后巷。
  craft:
    objective: 沈砚要确认异常动静来源并阻止可疑行为。
    conflict: 夜色与雨湿环境削弱视听判断，对方行动迅疾且刻意规避正面接触。
    turn: 沈砚放弃安全守候，主动跃入追击，从被动警觉转为动态介入。
    function: ADVANCE_PLOT
- id: S5
  heading:
    int_ext: 外
    location: 听雨楼客栈后巷
    time_of_day: 午夜
  summary: 沈砚追至后巷，截住翻墙黑影。
  action:
  - 窄巷幽深，两侧高墙滴水。月光斜劈而下，在湿漉漉的青石板上铺开一道冷银。
  - 一道黑影正攀上三尺高墙，肩线绷紧，动作利落如猫。怀中鼓起一块硬物轮廓。
  - 沈砚自墙头倒挂而下，靴底擦过砖缝，扬起细碎水雾。
  - 黑影闻风回头，铁面具半覆面容，只露出下颌紧绷的线条。
  dialogue:
  - character: 沈砚
    parenthetical: 低喝，声如刃破夜
    line: 站住！
  transition: ""
  source:
    chapter: 2
    excerpt: 沈砚被一阵急促的脚步声惊醒，他翻身下床，循声追至客栈后巷。
  craft:
    objective: 沈砚要逼停黑影、夺回或辨明其所携之物。
    conflict: 黑影拒绝交涉，选择逃逸，利用地形制造追击难度。
    turn: 黑影暴露铁面具与怀中异物，身份线索首次具象化。
    function: REVEAL_CHARACTER
- id: S6
  heading:
    int_ext: 外
    location: 临川镇东窄巷
    time_of_day: 午夜
  summary: 追至死巷，铁面人转身对峙，亮出身份与信物。
  action:
  - 两人疾奔。雨水在青石板上积成薄镜，倒映着交错晃动的剪影——一个沉稳如刀锋，一个诡谲似墨痕。
  - 黑影突然拐入死巷，背抵斑驳砖墙。雨水顺铁面具边缘滴落，在脚下汇成小洼。
  - 沈砚收势停步，距其五步，左手垂于身侧，右手缓缓按上剑柄。
  - 黑影胸口微微起伏，怀中硬物一角在月光下泛出青铜冷光。
  dialogue:
  - character: 铁面人
    parenthetical: 声音沙哑，字字带锈
    line: 沈三郎，多管闲事可不是好习惯。
  transition: ""
  source:
    chapter: 2
    excerpt: 追至一处死巷，黑影终于停下，缓缓转过身来。
  craft:
    objective: 沈砚要确认对方是否与苏窈兄长失踪案有关。
    conflict: 铁面人以身份压制与言语挑衅阻断质询路径，同时隐匿关键信息。
    turn: 沈砚认出青铜令牌——苏窈信中所指证物，目标从‘拦截可疑者’升级为‘锁定黑风寨关联人’。
    function: ESCALATE_CONFLICT
- id: S7
  heading:
    int_ext: 外
    location: 临川镇东死巷
    time_of_day: 午夜
  summary: 铁面人突袭脱身，遗落青铜令牌。
  action:
  - 沈砚瞳孔骤缩，目光钉在铁面人怀中露出的青铜令牌上——纹路古拙，一角蚀有‘黑风’二字。
  - 铁面人手腕一翻，三道寒光撕裂空气，直取沈砚咽喉、心口、膝弯。
  - 沈砚拧腰后仰，袖袍鼓风；一枚袖箭擦喉而过，割断一根发丝。
  - 长剑出鞘半尺，寒光迸溅，映亮他眉骨一道旧疤。
  - 铁面人借势蹬墙腾空，足尖在砖缝一点，身影已翻上墙头。
  - 沈砚挥剑格挡最后一枚袖箭，余势未消，剑尖震颤嗡鸣。他抬头——墙头空无一人，唯余雨丝斜织。
  - 青石板上，一枚青铜令牌静静躺在水洼中央，纹路清晰如刻。
  dialogue:
  - character: 沈砚
    parenthetical: 语速极缓，剑未全出
    line: 黑风寨的人？
  - character: 铁面人
    parenthetical: 冷笑，反手掷出袖箭
    line: 呵。
  transition: ""
  source:
    chapter: 2
    excerpt: 铁面人冷笑一声，反手掷出三枚袖箭。沈砚侧身闪过，长剑出鞘，巷中顿时寒光乍现。一番缠斗后，铁面人趁着夜色翻墙遁走，只在地上留下了那枚青铜令牌。
  craft:
    objective: 沈砚要制服铁面人并夺取令牌作为证据。
    conflict: 铁面人武艺精熟、战术果决，以攻代守瓦解近身压制。
    turn: 沈砚未能擒人，却获得确凿物证，调查从‘线索寻访’进入‘实证追索’阶段。
    function: PAYOFF
- id: S8
  heading:
    int_ext: 外
    location: 孤鹰岭山道
    time_of_day: 黎明
  summary: 沈砚与苏窈攀爬孤鹰岭，奔赴哨塔。
  action:
  - 薄雾如纱，缠绕陡峭石阶。沈砚青衫下摆沾着露水与泥痕，脚步沉稳向上。苏窈紧随其后，手指攥着油纸伞柄，指节泛白。
  - 她喘息微促，目光频频扫向沈砚腰间长剑——剑鞘上还嵌着半片未拭净的苔痕，像一道新鲜的伤疤。
  - 远处，孤鹰岭山顶轮廓在灰蓝天色中浮出，一座残破石塔尖顶刺入云层。
  dialogue: []
  transition: ""
  source:
    chapter: 3
    excerpt: 天将破晓，沈砚与苏窈循着令牌上的纹路，攀上了镇外的孤鹰岭。
  craft:
    objective: 沈砚要抵达哨塔验证铁面人身份及令牌线索；苏窈要确认兄长生死。
    conflict: 陡峭湿滑的山路延缓速度，苏窈体力不支却强撑，沈砚沉默施压，彼此信任尚在试探边缘。
    turn: 两人抵达山顶前最后平台，苏窈踉跄一步扶住岩壁，沈砚伸手虚扶未触即收——肢体距离首次接近，无声建立临时同盟。
    function: SETUP
- id: S9
  heading:
    int_ext: 外
    location: 孤鹰岭山顶哨塔空地
    time_of_day: 黎明
  summary: 三人于哨塔前对峙，苏窈失语，沈砚戒备，铁面人静候。
  action:
  - 晨光初透云隙，斜切过断墙残垣。石塔坍塌半边，野藤垂挂如灰绿血管。
  - 铁面人背对二人立于塔基前，玄色斗篷被山风掀起一角，露出腰间悬垂的青铜令牌——与沈砚掌中那枚纹路严丝合缝。
  - 苏窈喉头滚动，伞尖点地微颤，溅起细小泥星。
  - 沈砚右手缓缓覆上剑柄，拇指抵住剑格，指腹摩挲一道旧刻痕。
  dialogue:
  - character: 苏窈
    parenthetical: 声音发颤，尾音碎在风里
    line: 我兄长……是不是已经……
  transition: ""
  source:
    chapter: 3
    excerpt: 山顶云雾缭绕，一座废弃的石砌哨塔矗立在晨光里。"我兄长……是不是已经……"苏窈的声音有些发颤。
  craft:
    objective: 苏窈渴望确认兄长生死；沈砚欲核实铁面人真实意图与令牌来源。
    conflict: 铁面人以静制动，掌控节奏；苏窈情绪濒临溃散，沈砚无法从其动作预判下一步。
    turn: 铁面人开口打破沉默，主动掌控对话权，将被动等待转为主动设局。
    function: ESCALATE_CONFLICT
- id: S10
  heading:
    int_ext: 外
    location: 孤鹰岭山顶哨塔空地
    time_of_day: 黎明
  summary: 铁面人摘下面具，揭晓真实身份；苏窈情感决堤，沈砚维持警戒。
  action:
  - 铁面人缓缓抬手，指尖勾住铁面具边缘。
  - 金属刮擦声刺耳一响——面具离脸，露出一张清癯面容，左眉斜贯旧疤，下颌线条与苏窈如出一辙。
  - 苏窈瞳孔骤缩，油纸伞‘啪’地脱手，伞骨弹开半圈，停在风里。
  - 沈砚剑鞘微倾三寸，未拔，但右肩肌理绷紧如弓弦。
  dialogue:
  - character: 铁面人
    parenthetical: 嗓音低哑，却无防备之意
    line: 你们来得比我想的要快。
  - character: 苏窈
    parenthetical: 失声，膝盖微弯，似要跪倒又强行站直
    line: 哥哥！
  transition: ""
  source:
    chapter: 3
    excerpt: '"你们来得比我想的要快。"铁面人缓缓摘下面具，露出一张与苏窈有几分相似的脸。"哥哥！"苏窈失声惊呼。'
  craft:
    objective: 铁面人要终止伪装、重建血缘联结并争取沈砚有限信任。
    conflict: 苏窈本能扑向兄长，却被沈砚侧身半挡——他未松剑，亦未让路，身体成为一道沉默的界碑。
    turn: 血缘真相揭晓，但沈砚未收剑，苏窈未奔近，三人之间横亘着未解的旧案与未卸的戒备。
    function: REVEAL_CHARACTER
- id: S11
  heading:
    int_ext: 外
    location: 孤鹰岭山顶哨塔空地
    time_of_day: 黎明
  summary: 晨光破云，三人身影交织；苏窈从崩溃转向质问，沈砚剑势未松。
  action:
  - 朝阳猛然跃出云海，金红光芒泼洒而下，瞬间吞没雾气。
  - 光柱中，三道影子被拉长、交叠、又缓缓分离。
  - 苏窈低头看着自己与兄长并排投在青苔石上的影子——两道影子肩线齐平，而沈砚的影子斜斜切过他们之间，剑鞘影尖正抵在兄长后心位置。
  - 她忽然吸一口气，抬手抹去眼角水光，伞柄重新握紧。
  dialogue:
  - character: 苏窈
    parenthetical: 声音仍哑，但已无颤抖
    line: 你扮成黑风寨的人……查什么？
  transition: 淡出
  source:
    chapter: 3
    excerpt: 一桩旧案的真相，终于要在这孤鹰岭的黎明中揭开。
  craft:
    objective: 苏窈要撬开兄长隐瞒的真相；沈砚要判断这真相是否与自己追查的旧案同源。
    conflict: 铁面人尚未开口，但沈砚剑未归鞘、苏窈追问已出——真相的闸门开启，却无人知水流会冲垮谁。
    turn: 苏窈主动发问，将个人悲情升维为共同追索；沈砚的剑影刺入血缘缝隙，暗示合作中不可消弭的裂痕。
    function: ADVANCE_PLOT
