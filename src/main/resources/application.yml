spring:
  application:
    name: novel2screenplay
  servlet:
    multipart:
      # 上传小说文件大小上限——默认 1MB 对长篇偏小，放宽到 20MB
      max-file-size: 20MB
      max-request-size: 20MB
  profiles:
    # 默认启用 local 档：自动加载被 .gitignore 忽略的 application-local.yml（存放本地密钥）。
    # 部署或他人运行时，改用环境变量 AI_DASHSCOPE_API_KEY 即可，不依赖该文件。
    active: ${SPRING_PROFILES_ACTIVE:local}
  ai:
    dashscope:
      # ⚠ 切勿把密钥写进本文件！本文件会入库。
      # 密钥放 application-local.yml（已 gitignore）或环境变量 AI_DASHSCOPE_API_KEY。
      api-key: ${AI_DASHSCOPE_API_KEY:}
      chat:
        options:
          # 开发期 qwen-plus；终稿可切 qwen-max，超长章节可切 qwen-long（改环境变量即可）
          model: ${SCREENPLAY_MODEL:qwen-plus}
          # 抽取任务要稳定、少发挥，温度调低
          temperature: 0.3

server:
  port: 8080

# 长文规模化
screenplay:
  chunk:
    # 单块最大字符数：超长章节按段落切块抽取（块间用滚动提要保连续）。
    # 取 3000 贴合中文网文单章篇幅——多数章一块即可，既减少抽取调用、提速，
    # 又少切块边界、连贯性更稳；3000 字输入 + 结构化输出仍在 qwen-plus 余量内。
    max-chars: 3000
  episode:
    # 单次分集调用最多容纳的场景数：超过则分窗规划再拼接，避免长篇撞上下文/输出上限
    max-scenes-per-plan: 80
