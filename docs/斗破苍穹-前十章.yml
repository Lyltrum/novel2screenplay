  - S12
- number: 3
  title: 靶子登场
  synopsis: 新一轮测验日，萧媚七段再获赞誉，萧炎三段再遭羞辱；纳兰嫣然携云岚宗观礼，一句‘靶子’将萧炎钉在命运十字路口。
  hook: ‘靶子’一词出口，将萧炎从‘旧约对象’降格为‘可操控道具’，婚约解除已成不可逆程序。
  scene_ids:
