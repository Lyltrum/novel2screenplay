  - 萧战右手猛然攥紧手中玉石杯——杯身浮现蛛网裂纹，指节泛青，青色斗气自掌心丝丝渗出。
  - 纳兰嫣然低头盯着自己交叠的手，耳垂绿玉剧烈晃动，喉间吞咽动作明显。
  - 三位长老齐齐后靠椅背，二长老翘起二郎腿，鞋尖朝向萧战方向轻轻一点。
  - 萧炎喉结上下滚动，舌尖抵住上颚，尝到一丝铁锈味。
  dialogue:
  - character: 葛叶
    parenthetical: 声音发紧，目光避开萧战双眼
    line: 宗主大人在询问过嫣然之后，知道她与萧家还有一门亲事，所以……所以宗主大人想请萧族长，能够……解除了这婚约。
  source:
    chapter: 5
    excerpt: “宗主大人在询问过嫣然之后，知道她与萧家还有一门亲事，所以……所以宗主大人想请萧族长，能够……解除了这婚约。”
  craft:
