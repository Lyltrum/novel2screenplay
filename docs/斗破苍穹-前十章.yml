  synopsis: 萧薰儿拆解政治逻辑，萧炎怒火升维为对家族尊严的捍卫；葛叶起身，多方势力绷至临界，萧炎完成从内耗到应战的心理切换。
  hook: 冲突从暗流涌动升级为箭在弦上，所有角色进入不可逆的戏剧张力峰值。
