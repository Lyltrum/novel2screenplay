  synopsis: 萧炎被迫赴厅观礼，萧薰儿以袖纹点破云岚宗身份，纳兰嫣然步步施压，萧炎从旁观者跌入风暴中心，认知彻底坍塌。
  hook: 萧炎从‘事不关己’跌入‘自身即风暴中心’的认知坍塌。
