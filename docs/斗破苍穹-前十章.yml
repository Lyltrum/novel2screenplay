- id: S36
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 萧战强抑暴怒，玉石杯粉碎成粉，全场陷入死寂，羞辱感弥漫开来。
  action:
  - 粉末簌簌滑落萧战指缝，坠地无声。他缓缓摊开手掌，掌心残留灰白碎屑。
  - 三位长老中一人嗤笑出声，另一人用折扇遮住半张脸，只余一双冷眼。
  - 年轻子弟中有人窃窃私语，目光如针扎向角落——萧炎垂眸盯着自己鞋尖，鞋面沾着一点泥星。
  - 纳兰嫣然终于抬头，飞快瞥向萧炎方向，又像被烫到般迅速垂下，指尖抠进掌心。
  - 葛叶深吸一口气，右手已按在腰间剑柄上，青色斗气在指腹下隐隐流动。
  dialogue:
  - character: 萧战
    parenthetical: 声音嘶哑，如石碾过枯枝
    line: 咔！
  source:
    chapter: 5
    excerpt: “咔！”萧战手中的玉石杯，轰然间化为了一蓬粉末。
  craft:
    objective: 萧战以自控力维系族长体面，避免当场失控酿成更大危机
    conflict: 体内狂狮怒罡本能爆发与理智压制之间的剧烈拉锯
    turn: 萧战未动手，却比动手更令人胆寒——沉默成为最锋利的刀
