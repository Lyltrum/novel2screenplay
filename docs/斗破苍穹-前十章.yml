  synopsis: 纳兰嫣然当众退婚，萧炎暴怒后骤然死寂，继而掷地有声驳斥，喊出‘莫欺少年穷’，当场书写血契反向休妻，立誓三年之约。
  hook: 血契从‘休证’变成‘战书’，退婚仪式的终点悄然转为复仇倒计时的起点。
