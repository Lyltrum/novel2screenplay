meta:
  source_chapters: 10
  scene_count: 74
title: 莫欺少年穷
logline: 废柴少年萧炎遭退婚羞辱，以血立誓逆天改命，踏上炼药复仇之路。
style: 剧集
characters:
- name: 萧炎
  aliases:
  - 天才
  - 废物
  - 萧炎哥哥
  - 炎儿
  - 三少爷
  - 萧家少爷
  - 废柴少爷
  - 小娃娃
  - 少年
  - 小家伙
  - 小崽子
  description: 曾是乌坦城闻名的天才少年，四岁练气，十岁九段斗之气，十一岁成为家族百年最年轻斗者，三年前斗之气旋突兀消失，实力逐年倒退至斗之力三段，现遭族人嘲讽轻视。
- name: 萧媚
  aliases: []
  description: 十四岁少女，萧家年轻一辈种子级人物，斗之气七段，天赋优秀，受众人瞩目，对落魄后的萧炎态度疏离，内心存有昔日好感与现实落差的复杂情绪。
- name: 萧薰儿
  aliases:
  - 薰儿小姐
  - 你这妮子
  - 薰儿
  - 熏儿
  - 小妮子
  - 跟屁虫
  description: 身着紫色衣裙的少女，气质清冷淡雅如清莲初绽，斗之气九段，家族年轻一辈第一人，十四岁即将凝聚斗气之旋，是极少数在萧炎落魄后仍保持尊敬并主动关怀他的人。
- name: 中年男子
  aliases:
  - 测验员
  - 中年测验员
  description: 负责斗之气测验的萧家族中人员，语气漠然，对多数测试者态度平淡，唯独对萧薰儿罕见露出笑意并恭敬称呼‘薰儿小姐’。
- name: 萧战
  aliases:
  - 父亲
  - 族长
  - 萧族长
  - 萧叔叔
  description: 萧家现任族长，五星大斗师，萧炎的父亲，身着华贵灰色衣衫，粗眉豪气，对萧炎百般宠爱且不因儿子落魄而减。
- name: 墨管家
  aliases:
  - 墨管家
  description: 萧家青衫老者，负责管理事务，对萧炎怀有惋惜之情。
- name: 二长老
  aliases:
  - 黄袍老者
  description: 萧家长老之一，身着黄袍，对萧炎态度淡漠且含讥讽。
- name: 三位长老
  aliases:
  - 长老
  - 三长老
  description: 萧家族中地位与族长相当的三位长老，脸色淡漠，对萧炎流露不耐与不屑。
- name: 萧熏儿
  aliases:
  - 熏儿
  description: 与萧炎年龄相仿的少女，气质淡雅知性，家族天才，四至六岁时曾被萧炎暗中温养经脉，耳垂戴绿色玉坠。
- name: 月白衣袍老者
  aliases:
  - 七星大斗师
  - 贵客
  description: 昨夜被萧战提及的贵客之一，身穿月白衣袍，胸口绘有一弯银色浅月与七颗金星，实力为七星大斗师。
- name: 月白袍青年
  aliases:
  - 贵客
  - 青年
  description: 月白衣袍老者身旁的年轻男子，二十岁左右，英俊挺拔，胸口绘五颗金星，实力为五星斗者。
- name: 月白袍少女
  aliases:
  - 贵客
  - 少女
  - 冷艳少女
  description: 月白衣袍老者身旁的少女，与萧炎年龄相仿，容貌极美，耳垂戴绿色玉坠，胸口绘三颗金星，实力为三星斗者。
- name: 纳兰嫣然
  aliases:
  - 少女
  - 娇贵少女
  - 纳兰侄女
  - 嫣然
  - 纳兰小姐
  - 云岚宗宠儿
  - 天之骄女
  description: 加玛帝国狮心元帅纳兰桀的孙女，云岚宗宗主云韵亲收弟子，天赋绝佳，此次随云岚宗来萧家意图为解除与萧炎的婚约。
- name: 老者
  aliases:
  - 那位陌生老者
  - 透明的老者
  - 老头
  - 老家伙
  - 老混蛋
  - 老师
  - 药老
  description: 云岚宗随行人员之一，受纳兰嫣然示意，最终起身准备提出解除婚约事宜。
- name: 云韵
  aliases:
  - 云岚宗宗主
  - 宗主大人
  - 云韵大人
  - 紫裙少女
  - 少女
  description: 云岚宗现任宗主，亲自收纳兰嫣然为弟子并对其宠爱不已。
- name: 纳兰桀
  aliases:
  - 狮心元帅
  - 老头
  description: 加玛帝国狮心元帅，纳兰嫣然的祖父，与萧炎祖父是生死好友，当年亲口应下萧炎与纳兰嫣然的婚约。
- name: 白袍老者
  aliases:
  - 葛叶先生
  - 葛叶
  - 葛叶老先生
  - 葛叶长老
  description: 云岚宗长老，受宗主云韵之命前来萧家请求解除纳兰嫣然与萧炎的婚约。
- name: 纳兰肃
  aliases:
  - 纳兰老爷子
  description: 纳兰嫣然的祖父。
- name: 古河
  aliases:
  - 丹王古河
  - 古河大人
  - 丹王
  description: 加玛帝国著名炼药师，实力已达斗王之阶，名列帝国十大强者之一，亲手炼制了本章出现的聚气散。
- name: 英俊青年
  aliases:
  - 那名英俊青年
  - 青年
  description: 随纳兰嫣然与葛叶同至萧家的云岚宗年轻弟子，拔剑指向萧炎，被紫裙少女震慑后仓皇离去。
episodes:
- number: 1
  title: 三段耻辱
  synopsis: 萧炎在年度测验中当众暴露修为倒退至三段，沦为笑柄；萧薰儿以九段成绩震撼全场后径直走向他，用一句旧日箴言刺穿他强撑的尊严。
  hook: 萧炎肩线松弛——防御机制出现第一道微不可察的裂隙。
  scene_ids:
  - S1
  - S2
  - S3
  - S4
  - S5
  - S6
- number: 2
  title: 山崖低语
  synopsis: 萧炎独坐山崖倾泻穿越者身份与斗气溃散之痛，萧战悄然现身，父子在月光下展开一场克制而锋利的夜间对话，成年仪式的倒计时被正式揭开。
  hook: 黑戒幽光闪现——首次暗示戒指异变，为后续药老伏笔悄然埋下。
  scene_ids:
  - S7
  - S8
