    chapter: 5
    excerpt: “萧叔叔，侄女一直未曾前来拜见，该赔罪的，可是我呢，哪敢怪罪萧叔叔。”纳兰嫣然甜甜的笑道。
  craft:
    objective: 纳兰嫣然借谦恭姿态延缓摊牌时刻，争取心理缓冲
    conflict: 萧战对云岚宗地位的敬畏与对婚约隐忧的直觉形成内在撕扯
    turn: 萧战笑容未变，但呼吸节奏已悄然变沉，预示风暴将至
    function: ESCALATE_CONFLICT
- id: S34
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 葛叶正式切入主题，以云岚宗宗主之名施压，萧战神色剧变，全场屏息。
  action:
  - 葛叶整了整衣襟，笑容淡去，脊背挺直如剑。他抬手轻按纳兰嫣然肩头，少女肩线瞬间僵硬。
  - 萧战笑容凝固，瞳孔收缩，左手五指缓缓蜷入掌心，指甲掐进肉里。
  - 三位长老身体前倾，二长老嘴角牵起一丝冷弧，另两位长老指尖同时搭上腰间玉佩。
  - 萧炎向前半步踏出阴影，阳光劈开他半张脸——左眼幽暗，右眼灼亮。
  - 空气骤然稀薄，厅内烛火无声矮了半寸。
  dialogue:
  - character: 葛叶
    parenthetical: 提及‘宗主’时，神情郑重
    line: 呵呵，萧族长，在下今日所请求之事，便与嫣然有关，而且此事，还是宗主大人亲自开口……
  source:
    chapter: 5
    excerpt: “呵呵，萧族长，在下今日所请求之事，便与嫣然有关，而且此事，还是宗主大人亲自开口……”葛叶轻笑了一声，在提到宗主二字时，脸庞上的表情，略微郑重。
  craft:
    objective: 葛叶以宗主权威为盾，迫使萧战接受既定结果
    conflict: 云岚宗不可违逆的威压与萧家尊严、萧战父子情感间的根本性对抗
    turn: 萧战笑容彻底消失，面部肌肉开始细微抽搐，权力天平首次倾斜
