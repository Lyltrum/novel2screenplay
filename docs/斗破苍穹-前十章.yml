scenes:
- id: S1
  heading:
    int_ext: 外
    location: 萧家测验广场
    time_of_day: 白天
  summary: 萧炎测验失败，当众暴露三年来修为倒退至三段，成为全场笑柄。
  action:
  - 烈日灼灼，青石广场蒸腾着热气。黑底金纹的测验魔石碑矗立中央，表面幽光浮动。
  - 少年萧炎赤着双足站在碑前，粗布短衫洗得发白，肩胛骨在单薄衣料下清晰凸起。
  - 他缓缓抬手，掌心按上冰凉碑面——指节泛白，指甲深深陷进掌心，一滴血珠从拇指边缘渗出，无声滴落于青砖缝隙。
  - 魔石碑骤然爆亮！刺眼金光炸开，五个大字悬浮半空：'斗之力，三段！'
  - 人群如沸水翻腾。少年垂首，睫毛剧烈颤动，喉结上下滚动一次，却未吞咽。
  - 他嘴角向右牵起，弧度僵硬，左颊肌肉微微抽搐。
  dialogue:
  - character: 中年男子
    parenthetical: (漠然)
    line: 萧炎，斗之力，三段！级别：低级！
  transition: ""
  source:
    chapter: 1
    excerpt: 斗之力，三段！
  craft:
    objective: 萧炎想通过测验证明自己尚存一丝价值
    conflict: 魔石碑显示的‘三段’与他昔日天才之名形成毁灭性反差，全场目光即暴力
    turn: 他掌心渗血却未松手，用肉体痛感压住颤抖——尊严尚未彻底崩解
    function: REVEAL_CHARACTER
- id: S2
  heading:
    int_ext: 外
    location: 萧家测验广场
    time_of_day: 白天
  summary: 萧炎在持续嘲讽中沉默离场，人群自动分开一条窄道，无人靠近。
  action:
  - 镜头掠过攒动人头：少年们交叠手臂嗤笑，少女们掩口窃语，几位华服青年故意将腰间佩剑拍得哐当作响。
  - 萧炎静立原地，像一截被遗弃的枯木。汗珠顺着他下颌线滑落，在青砖上砸出深色小点。
  - 他忽然抬头——漆黑瞳孔扫过一张张熟悉面孔，视线停驻在前排一名扎双髻的少女脸上，对方立刻别过脸去，耳根微红。
  - 他慢慢松开右手，掌心四道月牙形血痕赫然在目。他攥紧又松开，再攥紧，最终垂臂身侧，转身走向人群末尾。
  - 阳光把他影子拉得细长伶仃，斜斜切过喧闹人群，像一道无人跨越的界线。
  dialogue:
  - character: 路人甲
    line: 三段？嘿嘿，果然不出我所料，这个“天才”这一年又是在原地踏步！
  - character: 路人乙
    line: 哎，这废物真是把家族的脸都给丢光了。
  - character: 群众
    line: 要不是族长是他的父亲，这种废物，早就被驱赶出家族……
  transition: ""
  source:
    chapter: 1
    excerpt: 周围传来的不屑嘲笑以及惋惜轻叹，落在那如木桩待在原地的少年耳中……
  craft:
    objective: 萧炎想逃离羞辱现场，保全最后一丝体面
    conflict: 围观者用声音织成牢笼，每句嘲讽都延长他离场的痛苦时间
    turn: 他不再低头，而是直视众人离开——屈辱未被消化，但姿态已悄然绷紧
    function: ESCALATE_CONFLICT
- id: S3
  heading:
    int_ext: 外
    location: 萧家测验广场
    time_of_day: 白天
  summary: 萧媚以七段成绩引爆全场赞誉，成为新焦点，其目光短暂掠过萧炎。
  action:
  - 测验员扬声高喊：'下一个，萧媚！'
  - 少女萧媚从人群右侧旋风般跃出，裙摆扬起浅粉色弧线。她小跑上前，马尾辫在颈后轻晃。
  - 她踮脚伸手触碑，动作熟稔如每日晨练。魔石碑幽光温柔漫上她指尖。
  - 碑面金芒流淌，凝成四字：'斗之气：七段！'
  - 她雀跃原地转圈，指尖点着自己鼻尖，脸颊因兴奋泛起桃红。
  - 周围少年纷纷挺直腰背，目光黏在她身上；几位少女凑近耳语，眼神明暗不定。
  dialogue:
  - character: 中年男子
    parenthetical: (语气微扬)
    line: 萧媚，斗之气：七段！级别：高级！
  - character: 萧媚
    line: 耶！
  transition: ""
  source:
    chapter: 1
    excerpt: 下一个，萧媚！
  craft:
    objective: 萧媚想借测验成绩确认自己新晋阶层地位
    conflict: 她余光瞥见萧炎孤影，昔日仰慕对象如今成为她阶层跃升的对照物
    turn: 她刻意放慢转身速度，让欢呼声追着自己脚步蔓延——虚荣获得即时喂养
    function: REVEAL_CHARACTER
- id: S4
  heading:
    int_ext: 外
    location: 萧家测验广场
    time_of_day: 白天
  summary: 萧薰儿以九段成绩震惊全场，测验员破例微笑，她却直接走向萧炎。
  action:
  - 测验员声音陡然沉静：'下一个，萧薰儿！'
  - 嗡——人群声浪瞬间抽空。所有脖颈齐刷刷转向东南角。
  - 紫裙少女自树荫下缓步而出。裙摆拂过青砖，不惊尘埃。她发间银铃无声，耳垂碧玉随步轻摇。
  - 她行至碑前，袖口滑落，露出一截雪腕。指尖悬停半寸，未触即亮。
  - 魔石碑迸发炽白强光，刺得前排少年眯眼后退。金芒凝成四字：'斗之气：九段！'
  - 全场死寂。一只麻雀扑棱棱飞过广场上空。
  dialogue:
  - character: 中年男子
    parenthetical: (罕见带笑)
    line: 萧薰儿，斗之气：九段！级别：高级！
