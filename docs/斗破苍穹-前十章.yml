- id: S35
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 婚约解除要求正式抛出，萧战怒极反静，纳兰嫣然显露真实紧张，长老们幸灾乐祸。
  action:
