  title: 透明人影
  synopsis: 悬浮戒指与透明老者现身，萧炎经历世界观崩塌、道德质问与心智重铸，最终以空手掌为要约，迫使药老亮出炼药师底牌。
  hook: ‘炼药师’三字出口——故事核心驱动力正式切换，主线目标升级。
