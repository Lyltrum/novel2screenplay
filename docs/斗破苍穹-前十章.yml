- id: S37
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 萧战功法暴走被长老强行喝止，尊严遭当众削薄，族长权威首次被质疑。
  action:
  - 萧战胸膛剧烈起伏，青色斗气如雾升腾，于面颊处勾勒出若隐若现的狮头虚影，鬃毛炸开。
  - 葛叶鹰爪般双手曲拢，青色斗气凝成细密剑气，在指尖嗡鸣震颤。
  - 前排少年脸色煞白，有人扶住椅背干呕，少女们下意识后退半步，裙裾扫过地面。
  - 三位长老厉喝声炸响如雷：“萧战，还不住手！你可不要忘记，你是萧家的族长！”
  - 萧战浑身一震，狮头虚影如烟溃散，斗气潮水般退去。他踉跄坐回主位，灰袍下摆拖地，沾满灰尘。
  dialogue:
  - character: 三位长老
    parenthetical: 厉喝如惊雷
    line: 萧战，还不住手！你可不要忘记，你是萧家的族长！
  source:
    chapter: 5
    excerpt: 就在萧战的呼吸越加急促之声，三位长老的厉喝声，却是宛如惊雷般的在大厅中响起：“萧战，还不住手！你可不要忘记，你是萧家的族长！”
  craft:
    objective: 三位长老借制止之名，行削弱族长威信之实，巩固长老会话语权
    conflict: 萧战个人愤怒与家族稳定表象之间的不可调和矛盾
    turn: 萧战被迫屈服于家族规训，族长身份从权力符号沦为枷锁
    function: ESCALATE_CONFLICT
- id: S38
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 萧战以反讽收束情绪，表面平静下暗流汹涌，纳兰嫣然濒临崩溃。
  action:
  - 萧战瘫坐主位，灰袍凌乱，目光扫过低头的纳兰嫣然，又掠过葛叶，最终落在自己空荡的右掌。
  - 他抬起手，缓慢而用力地抹过脸颊，指腹擦过颧骨，留下淡淡红痕。
  - 纳兰嫣然肩膀轻颤，睫毛剧烈抖动，一滴泪悬在眼尾，将落未落。
  - 萧炎静静看着父亲抹脸的手势，忽然抬手，用拇指狠狠蹭过自己左眼角。
  - 葛叶悄悄松开剑柄，袖口滑落，遮住手背一道新添血痕。
  dialogue:
  - character: 萧战
    parenthetical: 声音嘶哑，每个字都像砂纸磨过
    line: 纳兰侄女呐，好魄力啊，纳兰肃有你这女儿，真是很让人羡慕啊！
  source:
    chapter: 5
    excerpt: 一屁股坐回椅子上，萧战脸色淡漠的望着低头不言的纳兰嫣然，声音有些嘶哑的道：“纳兰侄女呐，好魄力啊，纳兰肃有你这女儿，真是很让人羡慕啊！”
  craft:
    objective: 萧战用讽刺刺穿对方体面，保留最后一丝反击尊严
    conflict: 语言软刀与实质屈辱之间的残酷平衡
    turn: 萧战放弃争辩，却以毒舌完成精神层面的反杀，关系彻底冻结
    function: REVEAL_CHARACTER
- id: S39
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 萧战彻底割裂亲情称谓，葛叶献上聚气散试图粉饰，长老震惊于宝物价值。
  action:
  - 纳兰嫣然嘴唇翕动，只发出单音：“萧叔叔……”，随即咬住下唇，渗出血丝。
  - 萧战抬手，动作轻缓却斩钉截铁：“叫我萧族长就好，叔叔这称谓，我担不起……”
  - 他目光扫过纳兰嫣然胸口三颗金星徽记，又缓缓移开，仿佛多看一眼都是玷污。
  - 葛叶急忙插话，笑容堆砌得过于急切，手指抹过戒指——绿玉盒凭空浮现，盒盖掀开刹那，异香如浪扑出。
  - 三位长老齐刷刷探身，二长老鼻翼猛张，另两人瞳孔骤缩，失声惊呼：“聚气散？”
  dialogue:
  - character: 萧战
    parenthetical: 语气冷漠，挥手如斩
    line: 呵呵，叫我萧族长就好，叔叔这称谓，我担不起，你是未来云岚宗的宗主，日后也是斗气大陆的风云人物，我家炎儿不过是资质平庸之辈，也的确是配不上你……
  - character: 葛叶
    parenthetical: 赔笑，伸手抹戒
    line: 多谢萧族长体谅了。萧族长，宗主大人知道今天这要求很是有些不礼貌，所以特地让在下带来一物，就当做是赔礼！
  - character: 三位长老
    parenthetical: 惊声齐呼
    line: 聚气散？
  source:
    chapter: 5
    excerpt: “多谢萧族长体谅了。”闻言，一旁的葛叶大喜，对着萧战赔笑道：“萧族长，宗主大人知道今天这要求很是有些不礼貌，所以特地让在下带来一物，就当做是赔礼！”
  craft:
    objective: 葛叶以重礼消解道德压力，将政治羞辱包装成等价交易
    conflict: 聚气散的珍贵与婚约解除的侮辱性之间无法弥合的价值鸿沟
    turn: 聚气散现身，将冲突从情感领域强行拽入利益权衡维度，埋下后续争夺伏笔
    function: ADVANCE_PLOT
- id: S40
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  action:
  - 阳光斜照进高阔厅堂，青砖地面泛着微光。厅中摆满紫檀木椅，族中少年少女端坐两侧，衣饰华贵。
  - 葛叶立于厅前，月白长袍垂地，手中托着一只雕花玉匣，匣盖微启，一缕碧绿幽光与清冽异香悄然漫溢。
  - 三位长老围拢上前，瞳孔骤缩，喉结滚动，手指不自觉地捻起衣袖边缘。
  - 萧媚坐在父亲身侧，舌尖轻舔下唇，目光如钉，死死锁住玉匣内那枚龙眼大小的碧绿药丸。
  - 厅内众人屏息，空气凝滞，唯有香息无声游走。
  dialogue:
  - character: 葛叶
    parenthetical: 微笑，指尖轻叩匣盖
    line: 呵呵，这是本宗名誉长老古河大人亲自所炼，想必各位也听过他老人家的名讳吧？
  source:
    chapter: 6
    excerpt: “呵呵，这是本宗名誉长老古河大人亲自所炼，想必各位也听过他老人家的名讳吧？”
  craft:
    objective: 葛叶欲以聚气散之贵重抬高云岚宗姿态，压服萧家议婚话语权
    conflict: 萧家长老虽垂涎丹药，却忌惮当众屈从将损家族威严；萧炎尚未开口，但其存在已是潜在对抗源
    turn: 聚气散真实价值被点破——它不仅是药，更是权力符号，厅内所有人目光已从纳兰嫣然转向玉匣，焦点悄然偏移
    function: SETUP
- id: S41
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  action:
  - 三位长老齐齐倒吸一口冷气，身形微晃，其中一位伸手欲触玉匣，又在半空僵住。
  - 萧战端坐主位，指节缓慢敲击扶手，目光扫过葛叶，再掠过纳兰嫣然，最后停驻在角落阴影里的萧炎身上。
  - 萧炎仍坐在末席，脊背挺直，左手搁在膝上，拇指反复摩挲食指指腹——那里有一道浅淡旧疤。
  - 萧薰儿端坐于侧前方，素手执茶盏，未饮，只以杯沿轻掩下半张脸；她眼角余光始终落在萧炎低垂的睫毛上。
  dialogue:
  - character: 三位长老
    line: 此药竟然还是出自丹王古河之手？
  source:
    chapter: 6
    excerpt: “此药竟然还是出自丹王古河之手？”闻言，三位长老耸然动容。
  craft:
    objective: 三位长老试图借古河名望确认聚气散真伪与价值，为后续争夺铺路
    conflict: 古河之名带来敬畏，也反向凸显萧家无炼药师的结构性弱势；长老们越热切，越暴露家族资源匮乏
    turn: 长老失态暴露萧家对丹药的渴求已达失控边缘，尊严让位于实利，为萧炎后续质问埋下道德支点
    function: REVEAL_CHARACTER
- id: S42
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  action:
  - 厅内嗡鸣骤止。所有头颅齐刷刷转向左后角。
  - 萧炎缓缓起身，青布短衫洗得发白，袖口磨出细毛边。他抬脸，下颌线绷紧，目光平直刺向葛叶。
  - 三位长老眉峰一拧，二长老右手按上腰间玉佩，三长老斗气微涌，袍角无风自动。
  - 萧薰儿放下茶盏，瓷底轻磕案几，一声脆响如冰裂。三位长老肩头同时一沉，气息顿滞。
  dialogue:
  - character: 萧炎
    line: 葛叶老先生，你还是把丹药收回去吧，今日之事，我们或许不会答应！
  - character: 二长老
    parenthetical: 拍案而起，茶盏震跳
    line: 萧炎，这里哪有你说话的份？给我闭嘴！
  - character: 大长老
    parenthetical: 语气平淡，却未看萧炎一眼
    line: 萧炎，退下去吧，我知道你心里不好受，不过这里我们自会做主！
  source:
    chapter: 6
    excerpt: 就在三位长老在心中寻思着如何给自己孙子把丹药弄到手之时，少年那压抑着怒气的淡淡声音，却是在大厅中突兀响了起来。
  craft:
    objective: 萧炎要夺回婚约议题的当事人身份，拒绝被当作沉默客体处置
    conflict: 整个萧家权力结构（长老、族长、礼法）合力压制他发声；连父亲萧战亦未即时援手
    turn: 萧炎一句‘我们或许不会答应’将‘萧家’从集体名词拆解为可分裂的主体，首次公开挑战家族权威共识
    function: ESCALATE_CONFLICT
- id: S43
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  action:
  - 萧炎向前踱出两步，布鞋踏在青砖上无声。他微微仰头，视线扫过三位长老涨红的脸。
  - 三长老掌心火光一闪即灭，额角青筋微跳；二长老喉结上下滑动，终未再言。
  - 萧薰儿起身，紫裙曳地无声，行至萧炎身侧半步，未看他，只将一缕碎发别至耳后——耳垂玉坠微晃，映出三颗金星暗纹。
  - 三位长老齐齐垂眸，退半步，袖中手指松开又攥紧。
  dialogue:
  - character: 萧炎
    parenthetical: 嘴角微扬，笑意未达眼底
    line: 三位长老，如果今天他们悔婚的对象是你们的儿子或者孙子，你们还会这么说么？
  - character: 萧薰儿
    parenthetical: 声线清越，如珠落玉盘
    line: 三位长老，萧炎哥哥说得并没有错，这事，他是当事人，你们还是不要跟着参合吧。
  source:
    chapter: 6
    excerpt: “三位长老，如果今天他们悔婚的对象是你们的儿子或者孙子，你们还会这么说么？”萧炎缓缓站起身子，嘴角噙着嘲讽，笑问道……“三位长老，萧炎哥哥说得并没有错，这事，他是当事人，你们还是不要跟着参合吧。”
  craft:
    objective: 萧炎借血缘共情撬动长老立场，迫使他们承认其主体性
    conflict: 长老们既需维护家族体面，又无法否认伦理逻辑；萧薰儿介入则引入更高阶威慑力
    turn: 长老们从‘训斥者’被迫退为‘旁观者’，权力让渡完成，萧炎正式获得发言席位
    function: ADVANCE_PLOT
- id: S44
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  action:
  - 萧炎转身，单膝点地，向萧战行标准晚辈大礼，额头触膝，脊线如弓。
  - 起身时，他未看父亲，径直走向厅中。脚步停在纳兰嫣然三步之外，距离恰够看清她耳垂绿玉坠的纹路，又不至于僭越。
  - 纳兰嫣然指尖掐进掌心，指甲印出四道浅痕；她昂首，雪白下巴微扬，脖颈拉出一道紧绷弧线。
  - 葛叶眯眼，月白袍袖垂落，遮住半只手——那只手正缓缓握成拳。
  dialogue:
  - character: 萧炎
    line: 纳兰小姐，我想请问一下，今日悔婚之事，纳兰老爷子，可曾答应？
  - character: 纳兰嫣然
    parenthetical: 秀眉微蹙，语速略快
    line: 爷爷不曾答应，不过这是我的事，与他也没关系。
  source:
    chapter: 6
    excerpt: 萧炎大步行上，先是对着萧战恭敬地行了一礼，然后转过身面对着纳兰嫣然，深吐了一口气，平静地出言问道：“纳兰小姐，我想请问一下，今日悔婚之事，纳兰老爷子，可曾答应？”
  craft:
    objective: 萧炎以礼法为盾，将婚约合法性锚定于纳兰桀与萧战祖父的生死盟约
    conflict: 纳兰嫣然以个人意志否定宗族契约；葛叶代表的云岚宗以宗门权威凌驾于世俗婚约之上
    turn: 纳兰嫣然脱口承认‘爷爷未曾答应’，无意中自证悔婚程序违法，为萧炎后续反击提供法理支点
    function: ADVANCE_PLOT
- id: S45
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  action:
  - 萧炎忽而侧身，目光如刀劈向三位长老。他右手指尖划过自己左腕内侧——那里空无一物，唯有一道极淡旧痕。
  - 二长老猛地后撤半步，撞翻身后矮凳；三长老抬袖掩面，袖口金线刺绣微微发颤。
  - 萧战在主位上缓缓坐直，十指交叉置于膝上，指节泛白。
  - 萧薰儿垂眸，指尖捻起一片飘落的桃花瓣——不知何时，窗外风起，花瓣穿窗而入。
  dialogue:
  - character: 萧炎
    parenthetical: 语速平稳，每个字都像刻在青砖上
    line: 当初的婚事，是两家老爷子亲自开口。
    type: 普通
  - character: 萧炎
    parenthetical: 停顿，扫视三位长老
    line: 他们没开口解除，这婚事便没人敢解。
    type: 普通
  - character: 萧炎
    parenthetical: 右手按在左腕旧痕上，声音压沉
    line: 否则，便是亵渎死去的长辈。
    type: 普通
  - character: 萧炎
    parenthetical: 目光直刺三位长老，一字一顿
    line: 族中，可有人敢干这种事？
    type: 普通
  source:
    chapter: 6
    excerpt: “既然老爷子未曾开口，那么还望包涵，我父亲也不会答应你这要求，当初的婚事，是两家老爷子亲自开口，现在他们没有开口解除，那么这婚事，便没人敢解，否则，那便是亵渎死去的长辈！我想，我们族中，应该没人会干出这种忤逆的事吧？”
  craft:
    objective: 萧炎以孝道纲常为武器，将悔婚行为升格为宗族伦理犯罪，逼长老们自我审查
    conflict: 长老们若支持悔婚即自认不忠不孝；若反对则等于否定云岚宗权威，陷入两难
    turn: 三位长老集体失语，权威彻底瓦解，萧炎从‘被裁决者’跃升为‘礼法解释者’
    function: ESCALATE_CONFLICT
- id: S46
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  action:
  - 纳兰嫣然胸膛剧烈起伏，耳垂绿玉坠随呼吸轻晃。她忽然抬手，将一枚银色小瓶‘啪’地拍在身旁案几上，瓶中药丸滚出两粒，碧光流转。
  - 她又从袖中抽出一卷淡青帛书，‘唰’地抖开——云岚宗徽记赫然在目。
  - 厅中少年们齐齐前倾，有人喉结滚动，发出吞咽声；萧媚指尖掐进掌心，留下月牙形血痕。
  - 葛叶终于抬眼，目光第一次真正落在萧炎脸上，瞳孔深处掠过一丝审视。
  dialogue:
  - character: 纳兰嫣然
    parenthetical: 下巴高扬，声音清亮却带刺
    line: 你究竟想怎样才肯解除婚约？嫌赔偿少？好，我可以让老师再给你三枚聚气散，另外，如果你愿意，我还可以让你进入云岚宗修习高深斗气功法，这样，够了吗？
  source:
    chapter: 6
    excerpt: “你究竟想怎样才肯解除婚约？嫌赔偿少？好，我可以让老师再给你三枚聚气散，另外，如果你愿意，我还可以让你进入云岚宗修习高深斗气功法，这样，够了吗？”
  craft:
    objective: 纳兰嫣然以绝对资源优势碾压，试图用物质诱惑终结精神对抗
    conflict: 条件越优厚，越反衬萧炎拒绝的代价之巨；云岚宗功法诱惑直击萧家修炼体系软肋
    turn: 纳兰嫣然主动亮出底牌，将谈判降维为交易，反而暴露其对萧炎精神抵抗的误判与焦虑
    function: REVEAL_CHARACTER
- id: S47
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 纳兰嫣然当众提出解除婚约，萧炎暴怒失态，被萧战喝止。
  action:
  - 阳光斜照进高阔厅堂，青砖地面映出人影。纳兰嫣然立于厅中，紫裙微扬，指尖轻抚耳垂玉坠。
  - 萧炎身体骤然剧烈颤抖，指节死死抠进掌心，指甲陷进皮肉。
  - 他缓缓抬头——清秀小脸扭曲狰狞，下颌绷紧如铁，瞳孔收缩成针尖黑点。
  - 纳兰嫣然倒退半步，绣鞋碾碎一粒浮尘。
  - 英俊青年‘锵’地拔剑，寒光直指萧炎咽喉，剑尖微颤。
  - 萧战霍然起身，茶盏震翻，褐色水渍在檀木案上迅速洇开。
  dialogue:
  - character: 萧炎
    parenthetical: 牙齿打颤，字句从齿缝迸出
    line: 我……真的很想把你宰了！
  - character: 萧战
    parenthetical: 厉声，手按案沿，青筋凸起
    line: 炎儿，不可无理！
  source:
    chapter: 7
    excerpt: 与纳兰嫣然所期待的有些不同，在她话出之后，面前的少年，身体猛的剧烈颤抖了起来……
  craft:
    objective: 萧炎要捍卫尊严，拒绝被施舍式羞辱。
    conflict: 纳兰嫣然以云岚宗背景居高临下提退婚，英俊青年持剑威慑，萧战当场压制。
    turn: 暴怒瞬间被强行压下，萧炎垂首再抬首时，脸上狰狞已化为死寂平静。
    function: ESCALATE_CONFLICT
- id: S48
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 纳兰嫣然重申退婚立场并抛出三年之约，萧战拍案而起怒斥。
  action:
  - 萧炎垂眸静立，呼吸缓慢而深长，肩背线条绷直如弓弦。
  - 葛叶眯眼打量萧炎，手指无意识摩挲袖口银月纹。
  - 纳兰嫣然挺直脊背，指尖捻住袖角，吐息微沉。
  - 萧战一掌砸在案上，茶盏跳起又跌落，碎瓷溅至纳兰嫣然裙摆旁。
  dialogue:
  - character: 纳兰嫣然
    parenthetical: 语调平稳，却带着不容置疑的余韵
    line: 萧炎，虽然不知道为什么我的举动让你如此愤怒，不过，你……还是解除婚约吧！
  - character: 纳兰嫣然
    parenthetical: 偏头，目光扫过首位上的萧战
    line: 请记住，此次我前来萧家，是我的老师，云岚宗宗主，亲自首肯的！
  - character: 萧战
    parenthetical: 转向萧炎，声音陡然拔高
    line: 萧叔叔，悔婚这种事，总需要有人去承担责任，若不是为了保全您的面子，嫣然此刻便会强行解婚！然后公布于众！
  - character: 萧战
    parenthetical: 猛然拍案，茶水泼洒胸前
    line: 纳兰嫣然，你不用做出如此强势的姿态，你想退婚，无非便是认为我萧炎一届废物配不上你这天之骄女……
  source:
    chapter: 7
    excerpt: “萧炎，虽然不知道为什么我的举动让你如此愤怒，不过，你……还是解除婚约吧！”
  craft:
    objective: 纳兰嫣然要体面完成退婚，同时逼萧炎接下三年之约以保全萧家颜面。
    conflict: 萧炎沉默抵抗，萧战情绪濒临失控，葛叶冷眼旁观施压。
    turn: 纳兰嫣然从单方面宣告退婚，被迫让渡主动权，将矛盾转化为具象赌约。
    function: ADVANCE_PLOT
- id: S49
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 萧炎爆发反击，掷地有声驳斥纳兰嫣然，首次公开喊出‘莫欺少年穷’。
  action:
  - 萧炎猛地抬头，下颌线如刀削，黑瞳灼灼如燃炭火。
  - 他向前踏出半步，布鞋踩碎地上一片碎瓷，发出刺耳刮擦声。
  - 纳兰嫣然喉间微动，后退半寸，指尖攥紧袖缘发白。
  - 萧战双目骤亮，手掌悬停半空，茶水顺指滴落。
  - 三位长老齐齐皱眉，二长老袖中手指悄然掐诀。
  dialogue:
  - character: 萧炎
    parenthetical: 冷笑，目光扫过纳兰嫣然耳垂玉坠
    line: 纳兰小姐，你又不是不清楚炎儿的状况，你让他拿什么和你挑战？如此这般侮辱与他，有意思么？
  - character: 萧炎
    parenthetical: 语速渐快，字字如钉
    line: 纳兰嫣然，你不用做出如此强势的姿态，你想退婚，无非便是认为我萧炎一届废物配不上你这天之骄女……
  - character: 萧炎
    parenthetical: 声如裂帛，震得梁上浮尘簌簌而落
    line: 三十年河东，三十年河西，莫欺少年穷！
  source:
    chapter: 7
    excerpt: “纳兰小姐，看在纳兰老爷子的面上，萧炎奉劝你几句话，三十年河东，三十年河西，莫欺少年穷！”
  craft:
    objective: 萧炎要撕碎对方道德制高点，夺回话语主权与尊严定义权。
    conflict: 纳兰嫣然以天赋、宗门、血统构建的优越叙事，遭遇萧炎用时间维度与历史事实的正面冲撞。
    turn: 全场震慑失语，萧战由震怒转为狂喜，纳兰嫣然首次面露动摇与羞愤交织之色。
    function: REVEAL_CHARACTER
- id: S50
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 纳兰嫣然被激怒应战，萧炎当场书写血契，以‘休证’反向羞辱。
  action:
  - 纳兰嫣然胸口剧烈起伏，耳垂玉坠随呼吸轻晃。
  - 萧炎转身大步走向长案，袍角翻飞如刃。
  - 他抓起狼毫，饱蘸浓墨，笔锋疾走，纸面嘶嘶作响。
  - 短剑出鞘寒光一闪，左手掌心横划——鲜血涌出，滴落白纸。
  - 他五指张开，狠狠按在契约之上，血印如朱砂烙印。
  - 萧炎拎起血契，臂膀肌肉绷紧，重重砸向纳兰嫣然面前案面——纸角掀起气流，震得她睫毛一颤。
  dialogue:
  - character: 纳兰嫣然
    parenthetical: 声音发紧，指尖掐进掌心
    line: 你……你敢休我？
  - character: 萧炎
    parenthetical: 一字一顿，血珠顺他手腕滑落
    line: 不要以为我萧炎多在乎你这什么天才老婆，这张契约，不是解除婚约的契约，而是本少爷把你逐出萧家的休证！从此以后，你，纳兰嫣然，与我萧家，再无半点瓜葛！
  source:
    chapter: 7
    excerpt: “不要以为我萧炎多在乎你这什么天才老婆，这张契约，不是解除婚约的契约，而是本少爷把你逐出萧家的休证！”
  craft:
    objective: 萧炎要以最决绝方式反转权力关系，将‘被弃者’身份彻底焚毁。
    conflict: 礼法秩序（女方退婚即占理）、宗门威压（云岚宗不可违）、家族存续（萧战需担责）三重枷锁。
    turn: 书面契约从‘退婚文书’质变为‘休妻铁证’，羞辱主体发生惊天逆转。
    function: ESCALATE_CONFLICT
- id: S51
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 萧炎跪拜父亲，立下三年之誓，决然离厅。
  action:
  - 萧炎单膝触地，膝盖砸在青砖上闷响一声。
  - 他额头重重磕下，额角抵住冰凉地面，脖颈青筋暴起。
  - 萧战静静凝视，抬手抹去溅在胡须上的茶渍，嘴角缓缓上扬。
  - 萧炎起身，未看任何人，袍袖带风，大步穿过厅门。
  - 门外日光倾泻，将他背影拉得细长而孤峭，一步踏出，门槛阴影如刀劈开明暗两界。
  dialogue:
  - character: 萧炎
    parenthetical: 声音沙哑，却字字凿入青砖
    line: 父亲，三年之后，炎儿会去云岚宗，为您亲自洗刷今日之辱！
  source:
    chapter: 7
    excerpt: “父亲，三年之后，炎儿会去云岚宗，为您亲自洗刷今日之辱！”眼角有些湿润，萧炎重重的磕了一头……
  craft:
    objective: 萧炎要向父亲交付歉意与承诺，完成精神成人礼。
    conflict: 父子间未言明的巨大牺牲（萧战将承受全城讥讽）与少年无法言说的自责。
    turn: 跪拜动作从传统孝道仪式，升华为战旗落地的宣誓——尊严不再依附于他人认可。
    function: PAYOFF
- id: S52
  heading:
    int_ext: 内
    location: 萧家大厅
    time_of_day: 白天
  summary: 萧炎离厅前对纳兰嫣然撂下战书，以沉默与背影完成尊严的最后一次锚定。
  action:
  - 萧炎脚步在纳兰嫣然身侧骤然停住。阳光斜切过厅堂，将他单薄的影子拉得细长、孤直。
  - 他侧脸线条绷紧，喉结微动，目光未抬，只从齿缝间吐出一句。
  - 少年脊背挺直，转身大步离去，衣角翻飞如刃。
  - 纳兰嫣然怔立原地，指尖捏着那张血契，纸边微微颤抖。
  - 她低头凝视契约，睫毛轻颤，指节泛白，纸张在她掌心发出细微的窸窣声。
  dialogue:
  - character: 萧炎
    parenthetical: 冰冷，不带起伏
    line: 三年之后，我会找你！
  source:
    chapter: 7
    excerpt: 在路过纳兰嫣然之时，萧炎脚步一顿，清淡的稚嫩话语，冰冷吐出。
  craft:
    objective: 萧炎要让纳兰嫣然记住这一刻的耻辱与自己的存在感。
    conflict: 纳兰嫣然代表的云岚宗权威与萧炎被剥夺的婚约身份构成结构性压制。
    turn: 血契从‘休证’变成‘战书’，退婚仪式的终点悄然转为复仇倒计时的起点。
    function: ADVANCE_PLOT
- id: S53
  heading:
    int_ext: 内
    location: 萧家大厅
    time_of_day: 白天
  summary: 萧战强压怒火送客，用克制的肢体语言替代爆发，展现族长威仪下的撕裂感。
  action:
  - 萧战伫立原地，面无表情，目光追随着儿子背影直至厅门。
  - 他垂在身侧的左手缓缓缩进宽大袖袍——镜头特写：青筋暴起的手背，指节因过度用力而泛出惨白。
  - 他喉结上下一滚，未发一言，只将视线冷冷扫向三位长老与葛叶一行。
  dialogue:
  - character: 萧战
    line: 三位，既然你们的目的已经达到，那便请回吧。
  source:
    chapter: 7
    excerpt: “三位，既然你们的目的已经达到，那便请回吧。”望着离开的少年，萧战脸庞淡漠，掩藏在衣袖中的拳头，却是捏得手指泛白。
  craft:
    objective: 萧战要体面驱逐云岚宗使团，保住萧家最后的颜面。
    conflict: 云岚宗已达成退婚目的却仍滞留施压，萧战需在不撕破脸的前提下终结羞辱。
    turn: 萧战从被动应允者转为主动逐客者，权力姿态发生微妙逆转。
    function: ESCALATE_CONFLICT
- id: S54
  heading:
    int_ext: 内
    location: 萧家大厅
    time_of_day: 白天
  summary: 纳兰嫣然表面致歉实则撤离，萧战以甩匣动作完成情绪宣泄，双方完成仪式性切割。
  action:
  - 纳兰嫣然深吸一口气，屈膝行礼，腰背绷直如弦。
  - 她起身时余光扫过萧战冷硬的下颌线，随即快步向厅外走去。
  - 葛叶与英俊青年疾步跟上，脚步略显仓促。
  - 萧战右手猛然挥出——玉匣破空飞旋，直射三人后背。
  - 葛叶反手一捞，稳稳接住匣子，指尖触到冰凉玉面时，嘴角牵出一丝苦笑。
  dialogue:
  - character: 纳兰嫣然
    parenthetical: 语速稍快，礼数周全却毫无温度
    line: 萧叔叔，今日之事，嫣然向您道歉了，日后若是有空，请到纳兰家做客！
  - character: 萧战
    line: 聚气散也带走！
  source:
    chapter: 7
    excerpt: “萧叔叔，今日之事，嫣然向您道歉了，日后若是有空，请到纳兰家做客！”恭身对着脸色漠然的萧战行了一礼，纳兰嫣然也不想多留，起身对着大厅之外行去，后面，葛叶与那名英俊的青年急忙跟上。
  craft:
    objective: 纳兰嫣然要迅速脱离现场避免二次冲突，萧战要彻底清除云岚宗馈赠的象征物。
    conflict: 聚气散既是赔礼也是羞辱凭证，交还动作成为尊严博弈的临界点。
    turn: 玉匣从‘赠礼’变为‘弃物’，云岚宗的善意包装被当场撕碎。
    function: PAYOFF
- id: S55
  heading:
    int_ext: 内
    location: 萧家大厅
    time_of_day: 白天
  summary: 萧薰儿首次展露威慑力，以金焰与箴言震慑云岚宗，扭转全场权力气场。
  action:
  - 纳兰嫣然三人即将跨过门槛，紫裙少女忽然合上手中古籍，书页轻响。
  - 她抬眸，阳光自高窗斜落，精准笼罩她半身——紫裙生辉，发丝镀金。
  - 镜头推近：她眼瞳深处，一点金焰无声燃起，细如针尖，灼灼不熄。
  - 葛叶瞳孔骤缩，枯手闪电般攥住纳兰嫣然手腕与青年胳膊，拖拽着三人踉跄冲出厅门。
  - 众人惊愕回头，只见三道仓皇背影撞开厅门，木框嗡嗡震颤。
  dialogue:
  - character: 萧薰儿
    parenthetical: 声线清越，不疾不徐，字字如珠落玉盘
    line: 纳兰家的小姐，希望你日后不会为今日的大小姐举动而感到后悔，再有，不要以为有云岚宗撑腰便可横行无忌，斗气大陆很大很大，比云韵强横的人，也并不少……
  source:
    chapter: 7
    excerpt: “纳兰家的小姐，希望你日后不会为今日的大小姐举动而感到后悔，再有，不要以为有云岚宗撑腰便可横行无忌，斗气大陆很大很大，比云韵强横的人，也并不少……”在纳兰嫣然三人即将出门的霎那，少女轻灵的嗓音，带着淡淡的冷漠，忽然地响了起来。
  craft:
    objective: 萧薰儿要警告纳兰嫣然，同时向萧家所有人昭示她对萧炎的绝对立场。
    conflict: 云岚宗的宗门威压与萧薰儿隐而不发的恐怖实力形成无形对峙。
    turn: 葛叶从从容长老沦为惊弓之鸟，萧薰儿由旁观者升格为不可测变量。
    function: REVEAL_CHARACTER
- id: S56
  heading:
    int_ext: 内
    location: 萧家议事大厅
    time_of_day: 白天
  summary: 萧炎以血为墨，在议事厅石阶刻下三个‘休’字，完成对纳兰嫣然婚约的终极反制。
  action:
  - 青砖地面映着斜射进来的日光，三道血迹未干的‘休’字赫然刻在中央石阶上，墨迹混着暗红血痂。
  - 萧炎单膝跪地，右手紧攥一柄短匕，指节泛白，刃尖抵住左掌心，血珠顺着腕骨滑落，在青砖缝里积成小洼。
  - 他缓缓起身，将染血的左手按在石阶最上方——那里，一枚褪色的赤色婚契残角被钉入砖缝，半截断绳垂落。
  - 萧薰儿立于阶侧，紫裙下摆微扬，指尖悬停半寸，一缕金焰无声游走于她指隙，映得她眼瞳如熔金。
  - 三位长老背手而立，黄袍老者袖口微颤，另两人喉结上下滚动，却无人上前一步。
  - 墨管家站在柱影里，低头盯着自己青布鞋尖，鞋面沾着一点未擦净的血灰。
  dialogue:
  - character: 萧炎
    parenthetical: (声音沙哑，不抬眼)
    line: 休。
    type: 普通
  transition: ""
  source:
    chapter: 7
    excerpt: 萧炎咬破手指，在青石阶上写下三个血淋淋的‘休’字
  craft:
    objective: 萧炎要以最决绝的方式宣告婚约终结，夺回尊严定义权
    conflict: 整个萧家礼法秩序与长老权威构成无形压力墙，阻止他以‘废柴’之身僭越仪式主权
    turn: 血字刻成瞬间，萧薰儿金焰浮现，权力气场悄然从云岚宗向萧炎倾斜
    function: PAYOFF
- id: S57
  heading:
    int_ext: 内
    location: 萧家议事大厅侧廊
    time_of_day: 白天
  summary: 纳兰嫣然在侧廊强压羞愤，以银簪入木宣泄失控情绪，埋下三年后必返之伏笔。
  action:
  - 侧廊木格窗透进细碎光斑，照见纳兰嫣然后颈绷紧的线条。
  - 她背对大厅，手指用力掐进掌心，指甲边缘泛出青白。
  - 葛叶静立三步外，月白袍襟角垂落，目光扫过她耳垂那枚晃动的绿玉坠——坠子正微微震颤。
  - 英俊青年欲上前，被葛叶抬手止住；青年喉结一滚，退半步，剑鞘磕在廊柱上发出闷响。
  - 纳兰嫣然忽然抬手，将发间一支云纹银簪拔下，簪尖朝下，狠狠插进廊柱松木纹理中，深没至尾。
  - 木屑簌簌落下。
  dialogue:
  - character: 纳兰嫣然
    parenthetical: (低语，簪子仍在震)
    line: ……我记住了。
    type: 普通
  transition: ""
  source:
    chapter: 7
    excerpt: 纳兰嫣然转身离去，银簪深深钉入廊柱
  craft:
    objective: 纳兰嫣然要维持天之骄女体面，压制当众受辱的生理性颤抖
    conflict: 身体本能的震颤与云岚宗弟子在场的双重监视构成内在绞杀
    turn: 银簪入木的物理震感反向镇定神经，她眼神从涣散转为冰封
    function: REVEAL_CHARACTER
- id: S58
  heading:
    int_ext: 内
    location: 萧家议事大厅主位后屏风内
    time_of_day: 白天
  summary: 萧战在屏风后独处，面对婚契残卷与母亲遗留黑戒，首次直面家族存续与儿子命运的撕裂抉择。
  action:
  - 屏风绘着水墨松鹤，右下角一道新鲜裂痕蜿蜒如蛇。
  - 萧战独自伫立，左手死死按在屏风木框上，指腹压着裂痕边缘，木刺扎进皮肉也未松动。
  - 他面前案几摊开一卷泛黄帛书——‘萧纳联姻契’，朱砂印已褪成褐斑。
  - 他右手缓缓抬起，不是去碰帛书，而是伸向自己左胸衣襟内袋。
  - 指尖触到硬物轮廓：一枚温润黑戒，表面幽光一闪即隐。
  - 他呼吸骤停半拍，喉结剧烈上下滑动一次。
  dialogue: []
  transition: ""
  source:
    chapter: 7
    excerpt: 萧战屏息凝视那枚黑色戒指，指腹摩挲着戒面隐现的暗纹
  craft:
    objective: 萧战要确认黑戒是否真有异动，以此判断是否该押上全族赌萧炎翻身
    conflict: 族长职责要求他斩断‘废物’拖累，父亲本能却让他攥紧那枚可能改命的戒指
    turn: 黑戒幽光闪现的刹那，他按在裂痕上的拇指突然发力，木刺更深陷进皮肉——痛感成了唯一锚点
    function: SETUP
- id: S59
  heading:
    int_ext: 内
    location: 萧家藏书阁顶层暗室
    time_of_day: 黄昏
  summary: 萧炎于藏书阁暗室发现《焚诀》残卷，黑戒呼应异动，开启逆天改命的第一道密钥。
  action:
  - 斜阳穿过高窗窄缝，在积尘的地板上切出一道金线，正横在暗室中央。
  - 萧炎盘坐于金线左侧，面前摊开一本焦边古册，纸页脆黄，墨迹洇散。
  - 他左手缠着粗麻布条，血渍已渗出三层，右手食指却稳稳悬停在册页某行之上——那行字旁，用极细朱砂画了个歪斜箭头。
  - 窗外忽起风，吹动半开的窗扇‘吱呀’轻响，他睫毛未颤，指腹却无意识摩挲过箭头旁一行小字：‘焚诀·残卷·引气篇’。
  - 暗室角落，黑戒静静躺在青砖上，戒面倒映着窗外渐沉的夕照，幽光如活物般缓缓流转。
  dialogue: []
  transition: ""
  source:
    chapter: 7
    excerpt: 萧炎在藏书阁暗室翻出《焚诀》残卷，黑戒在夕照下泛起微光
  craft:
    objective: 萧炎要找到能对抗斗之气溃散的功法，哪怕只是残卷
    conflict: 古册字迹模糊、引气路径与常理相悖，且黑戒幽光干扰视线，令他无法专注辨读
    turn: 他指腹摩挲朱砂箭头时，黑戒幽光突然同步明灭三次，册页上那行小字竟浮起微弱金痕
    function: ADVANCE_PLOT
- id: S60
  heading:
    int_ext: 外
    location: 萧家后山山壁
    time_of_day: 黄昏
  summary: 萧炎独坐山崖，以血立誓，压抑悲愤。
  action:
  - 萧炎独自坐在陡峭山壁边缘，双腿悬空，背影单薄。雾气弥漫的魔兽山脉在对面若隐若现。
  - 他肩膀微微耸动，喉结上下滚动，下唇被牙齿咬出一道浅白压痕。
  - 十指深深插进乌黑短发，指节泛白。一缕暗红血丝从嘴角渗出，缓缓滑落至下颌。
  - 他摊开左手——掌心横亘一道新鲜血痕，尚未凝固。夕阳余光映在血线上，微微反光。
  dialogue:
  - character: 萧炎
    parenthetical: 嘶哑，一字一顿
    line: 今日的侮辱，我不想再受第二次！
  source:
    chapter: 8
    excerpt: “今日的侮辱，我不想再受第二次！”摊开那有着一道血痕的左手，萧炎的声音，嘶哑却坚定。
  craft:
    objective: 萧炎要宣泄屈辱并确认自己重拾斗志的决心。
    conflict: 身体本能的颤抖与理智强压的静默形成内在撕扯。
    turn: 血痕暴露——外伤成为内心决裂的物理印记。
    function: REVEAL_CHARACTER
- id: S61
  heading:
    int_ext: 外
    location: 萧家后山山壁
    time_of_day: 黄昏
  summary: 怪笑声突至，萧炎警觉转身，锁定戒指异动。
  action:
  - 萧炎猛然旋身，脊背绷直如弓，瞳孔骤缩，鹰隼般扫视身后嶙峋乱石与枯松阴影。
  - 他呼吸停滞半秒，喉结剧烈一跳，手指无意识按上右手中指——一枚古朴黑色戒指泛着幽微哑光。
  - 他死死盯住戒指，睫毛颤动，额角渗出细汗。
  dialogue:
  - character: 萧炎
    parenthetical: 声音发紧，强作镇定
    line: 是你在说话？
  source:
    chapter: 8
    excerpt: “是你在说话？”萧炎强忍住心头的惊恐，努力让自己声音平静下来。
  craft:
    objective: 萧炎要确认声音来源并掌控突发威胁。
    conflict: 未知存在打破现实逻辑，挑战其对世界的基本认知。
    turn: 视线从虚空锁定实体戒指——威胁具象化。
    function: SETUP
- id: S62
  heading:
    int_ext: 外
    location: 萧家后山山壁
    time_of_day: 黄昏
  summary: 萧炎暴怒掷戒，失控瞬间暴露三年积压的创伤。
  action:
  - 萧炎一把攥住右手，指甲深陷掌心。他猛地扯下黑色戒指，手臂高扬，腕部肌肉绷出青筋。
  - 戒指脱手飞出，划出一道短促黑弧，直坠云雾翻涌的深渊。
  - 他瞳孔骤然放大，整个人僵住——右手五指还维持着投掷姿态，指尖微微抽搐。
  - 三秒静默。他猛吸一口气，扑向崖边，徒劳地伸手抓向虚空。
  dialogue:
  - character: 萧炎
    parenthetical: 暴怒嘶吼，破音
    line: 我操你妈！
  source:
    chapter: 8
    excerpt: “我操你妈！”一向自诩沉稳冷静的萧炎，此刻忽然宛如疯子般的暴跳起来……
  craft:
    objective: 萧炎要摧毁罪魁祸首以夺回尊严控制权。
    conflict: 情感爆发与理性残余的激烈对抗（掷戒前已知是母亲遗物）。
    turn: 戒指坠崖——物理性切断与‘加害者’的联结，却埋下更大悬念。
    function: ESCALATE_CONFLICT
- id: S63
  heading:
    int_ext: 外
    location: 萧家后山山壁
    time_of_day: 黄昏
  summary: 萧炎懊悔平复，转身即见悬浮戒指与透明老者，认知彻底颠覆。
  action:
  - 萧炎呆立崖边，目光死死钉在戒指消失的雾气处。山风掀起他额前碎发，露出通红眼尾。
  - 他抬手狠狠拍打自己额头，发出沉闷‘啪’声，小臂肌肉绷紧。
  - 他缓缓吐气，胸膛起伏渐缓，眼神从涣散转为锐利，像刀锋重新淬火。
  - 他倏然转身——瞳孔骤然地震，手指剧烈颤抖，直直指向前方虚空。
  dialogue:
  - character: 萧炎
    parenthetical: 懊恼低语，咬字极重
    line: 蠢货，太莽撞了，太莽撞了！
  source:
    chapter: 8
    excerpt: 愣愣地望着那消失在雾气中的戒指，萧炎愕然了好片刻，小脸缓缓地平静了下来，懊恼得拍了拍额头：“蠢货，太莽撞了，太莽撞了！”
  craft:
    objective: 萧炎要重建心理秩序并评估新威胁。
    conflict: 刚建立的理性框架被超自然存在当场击穿。
    turn: 戒指悬浮复现+透明人影现身——失控感升级为世界观崩塌。
    function: SETUP
- id: S64
  heading:
    int_ext: 外
    location: 萧家后山山壁
    time_of_day: 黄昏
  summary: 老者现身，萧炎强抑怒火质问，双方首次正面交锋。
  action:
  - 漆黑古朴戒指静静悬浮于离地半尺处。戒指上方，一道半透明苍老人影盘膝而坐，白须飘动，面容褶皱如古树皮。
  - 萧炎后退半步，脚跟碾碎一块碎石，碎石滚落悬崖。他喉结上下滑动，右手不自觉护在胸前。
  - 老者眯眼打量萧炎，嘴角咧开，露出缺牙的笑。萧炎左眉不受控地抽动一下。
  dialogue:
  - character: 老者
    parenthetical: 笑眯眯，语气轻描淡写
    line: 嘿嘿，小娃娃，用不着这么暴怒吧？不就是吸收了你三年的斗之气嘛。
  - character: 萧炎
    parenthetical: 压抑怒气，每个字都像从齿缝里挤出
    line: 老家伙，既然你躲在戒指之中，那么也应该知道因为你吸收了我的斗之气，给我带来了多少嘲骂吧？
  source:
    chapter: 8
    excerpt: “嘿嘿，小娃娃，用不着这么暴怒吧？不就是吸收了你三年的斗之气嘛。”透明的老者，笑眯眯的盯着目瞪口呆的萧炎，开口道。
  craft:
    objective: 萧炎要追索三年屈辱的因果并索要交代。
    conflict: 老者轻佻态度与萧炎切肤之痛形成尖锐价值冲突。
    turn: 老者将‘伤害’重构为‘成长催化剂’——道德指控被哲学解构。
    function: REVEAL_CHARACTER
- id: S65
  heading:
    int_ext: 外
    location: 萧家后山山壁
    time_of_day: 黄昏
  summary: 萧炎情绪沉淀，以谈判姿态设定底线，展现心智蜕变。
  action:
  - 萧炎垂眸盯着自己摊开的右手，指尖无意识摩挲掌心旧茧。山风拂过，他睫毛轻颤。
  - 他忽然抬眼，目光如刃刺向老者，嘴角牵起一丝冷峭弧度。
  - 他缓缓活动五指，关节发出轻微脆响，然后轻轻舒展手腕，仰头深吸一口山间清冽空气。
  - 他直视老者，下颌线绷紧，眼神却沉静下来。
  dialogue:
  - character: 萧炎
    parenthetical: 语气平淡，带着不容置疑的疏离
    line: 虽然不知道你究竟是谁，不过我想问句，你以后还想依附在戒指中吸取我的斗之气？如果是那样的话，我劝你还是另外去找宿主吧，我养不起你。
  source:
    chapter: 8
    excerpt: 轻轻舒展了一下手腕，萧炎长长的吐了一口气，仰头道：“虽然不知道你究竟是谁，不过我想问句，你以后还想依附在戒指中吸取我的斗之气？如果是那样的话，我劝你还是另外去找宿主吧，我养不起你。”
  craft:
    objective: 萧炎要确立与老者的新型权力关系——从受害者转为谈判方。
    conflict: 老者掌握力量优势，萧炎仅凭意志与话术争夺主动权。
    turn: 萧炎从情绪宣泄转向利益博弈——关系性质发生根本逆转。
    function: ADVANCE_PLOT
- id: S66
  heading:
    int_ext: 外
    location: 萧家后山山壁
    time_of_day: 黄昏
  summary: 老者抛出诱惑，萧炎以退为进试探底牌，谈判进入实质阶段。
  action:
  - 老者皱纹堆叠的脸庞绽开一朵菊花般的笑，手指捻须，目光灼灼锁住萧炎双眼。
  - 萧炎瞳孔微不可察地一缩，右手悄然握拳又松开，指腹反复摩挲拇指内侧旧伤疤。
  - 他沉默三秒，喉结滚动，终于开口，声音比之前更低、更沉。
  dialogue:
  - character: 老者
    parenthetical: 语调上扬，带着钩子
    line: 小娃娃，想变强吗？想受到别人的尊崇吗？
  - character: 萧炎
    parenthetical: 撇嘴，目光斜睨，试探中藏锋
    line: 你有办法吧？
  source:
    chapter: 8
    excerpt: 沮丧的叹了一口气，萧炎眼睛瞟了瞟那故作高深莫测模样的透明老者，心头一动，撇嘴道：“你有办法吧？”
  craft:
    objective: 萧炎要迫使老者亮出真实筹码以换取合作可能。
    conflict: 双方信息不对等——老者握有力量秘密，萧炎仅有唯一可交换资源（灵魂强度）。
    turn: 萧炎主动抛出交易框架——从被动承受者转为规则制定者。
    function: ADVANCE_PLOT
- id: S67
  heading:
    int_ext: 外
    location: 萧家后山山壁
    time_of_day: 黄昏
  summary: 老者最终亮出核心筹码——炼药师身份，开启全新命运路径。
  action:
  - 老者笑容凝滞一瞬，随即摇头失笑，身形缓缓降下，足尖轻点地面，激起细微尘粒。
  - 他绕着萧炎慢踱半圈，目光如探针扫过少年肩线、腰腹、指节，最后停驻在萧炎左耳垂——那里有一颗极淡的褐色小痣。
  - 老者突然停步，脸上掠过一丝极快的、近乎怀念的恍惚，随即被狡黠覆盖。
  - 他抬头，皱纹舒展，声音压低，带着奇异的磁性：
  dialogue:
  - character: 老者
    parenthetical: 轻声，却字字清晰，目光如钉
    line: 你想成为炼药师吗？
  source:
    chapter: 8
    excerpt: 迟疑了一会，似乎方才极其不情愿的开口道：“你想成为炼药师吗？”
  craft:
    objective: 老者要以终极诱惑绑定萧炎，完成双向依存关系的确立。
    conflict: 萧炎对‘炼药师’一词毫无概念，但直觉其分量远超想象——认知鸿沟构成新障碍。
    turn: ‘炼药师’三字出口——故事核心驱动力正式切换，主线目标升级。
    function: PAYOFF
- id: S68
  heading:
    int_ext: 外
    location: 萧家后山断崖边
    time_of_day: 夜晚
  summary: 萧炎于断崖独处，身体与意志濒临极限，黑色戒指异动初显。
  action:
  - 月光惨白，照在嶙峋黑石上。萧炎单膝跪地，右手死死抠进岩缝，指腹渗血，混着泥土。
  - 他剧烈喘息，额角青筋暴起，左手按在小腹——斗之气旋位置空荡灼痛。
  - 黑色戒指在腕间幽光微闪，一缕极淡的灰雾自戒面渗出，缠绕他指尖。
  - 远处乌坦城灯火如豆，风声呜咽，卷起他散乱的黑发与残破衣角。
  dialogue:
  - character: 萧炎
    parenthetical: 咬牙低吼，喉结滚动
    line: 三年……整整三年！
  transition: ""
  source:
    chapter: 9
    excerpt: 萧炎在后山宣誓复仇时，戒指中神秘老者现身
  craft:
    objective: 萧炎要确认自己是否还能凝聚斗之气，验证复仇可能。
    conflict: 身体本能抗拒运转斗之气，戒指持续吸噬，意志与生理双重崩坏。
    turn: 戒指首次主动释放灰雾，暗示其存在正从沉睡转向干预。
    function: SETUP
- id: S69
  heading:
    int_ext: 外
    location: 萧家后山断崖边
    time_of_day: 夜晚
  summary: 药老真身初现，以超然姿态直面萧炎，揭穿三年吸噬真相。
  action:
  - 灰雾骤然收束，凝成半透明人形轮廓——佝偻老者，白须垂胸，双目闭合，周身无实体却压得空气嗡鸣。
  - 萧炎瞳孔骤缩，向后猛仰，脊背撞上冷硬岩壁，喉间发出短促抽气声。
  - 老者袖袍轻拂，萧炎掌心伤口血珠悬浮停驻，未落。
  - 戒指嗡鸣加剧，表面裂开细纹，幽光暴涨如呼吸般明灭三次。
  dialogue:
  - character: 老者
    parenthetical: 声如砂纸磨铁，不带情绪却字字入骨
    line: 小子，你这具身子……倒比老夫预想的，多撑了三日。
  transition: ""
  source:
    chapter: 9
    excerpt: 戒指中神秘老者现身，承认三年来吸走其斗之气
  craft:
    objective: 药老要测试萧炎神志清醒度与承受力，决定是否启动契约。
    conflict: 萧炎对‘被吸噬’的愤怒与恐惧，与药老绝对力量形成的碾压性威压。
    turn: 萧炎发现伤口血珠悬停——意识到对方掌控远超想象，怒意被震惊冻结。
    function: REVEAL_CHARACTER
- id: S70
  heading:
    int_ext: 外
    location: 萧家后山断崖边
    time_of_day: 夜晚
  summary: 萧炎以沉默与姿态逼出药老真实意图，双方进入实质谈判。
  action:
  - 萧炎猛地抬手，抹去嘴角血丝，指甲刮过下唇留下白痕。
  - 他直视药老虚影，膝盖未松，腰杆一寸寸挺直，喉结上下滑动两次。
  - 药老虚影缓缓睁眼——双瞳无虹膜，唯两簇幽蓝火苗静静燃烧。
  - 萧炎左手突然攥紧，指节爆响，右手却悄然松开岩缝，掌心朝上，摊开——空无一物，却像托举千钧。
  dialogue:
  - character: 萧炎
    parenthetical: 声音嘶哑，却无颤抖
    line: 吸走了，就还回来。
  - character: 老者
    parenthetical: 幽蓝火苗微微摇曳
    line: 还？呵……老夫若能还，何须等你三年？
  transition: ""
  source:
    chapter: 9
    excerpt: 二人达成交易：老者助萧炎一年内达七段斗之气，换取继续依附
  craft:
    objective: 萧炎要迫使药老亮出底牌，换取可兑现的助力而非空诺。
    conflict: 药老欲以‘不可逆’设限维持主导权，萧炎以决绝姿态挑战规则边界。
    turn: 萧炎摊开的空手掌成为无声要约——他不要施舍，只要等价交换。
    function: ESCALATE_CONFLICT
- id: S71
  heading:
    int_ext: 外
    location: 后山悬崖顶
    time_of_day: 黄昏
  summary: 萧炎与萧薰儿于后山重逢，萧炎神态自信焕发，主动亲近；二人默契依旧，萧炎为购药开口借钱，薰儿爽快赠卡。
  action:
  - 萧薰儿脚尖轻点山岩，紫裙翻飞如蝶，跃上山顶。微偏头，目光扫向悬崖边静立的萧炎。
  - 萧炎背对夕阳，衣角被山风掀起。他缓缓转身，嘴角微扬，眼神沉静而锐利。
  - 两人视线在摇曳山风中相接。萧薰儿瞳孔微缩，指尖无意识捻住一缕发丝。
  - 萧炎走近，抬手捏了捏她脸颊——动作熟稔自然。薰儿眼睫轻颤，未躲。
  - 萧炎松手后稍显局促，挠了挠后脑，耳根泛红。
  - 薰儿垂眸一笑，背后纤指轻弹，一张紫金色卡片悄然浮现，五道波纹流转生光。
  dialogue:
  - character: 萧薰儿
    parenthetical: 浅笑，酒窝微现
    line: 看萧炎哥哥现在的模样，似乎并不需要薰儿来宽慰了？
  - character: 萧炎
    parenthetical: 耸肩，笑意温醇
    line: 人经历了打击，总得成长不是？
  - character: 萧薰儿
    parenthetical: 抿嘴，语气笃定
    line: 她一定会后悔的。
  - character: 萧炎
    parenthetical: 目光温软，语带调侃
    line: 薰儿也长大了啊，不过还好，没忘记萧炎哥哥小时候为了给你摘果子摔得满身青肿的狼狈样。
  - character: 萧炎
    parenthetical: 干笑，小脸微红
    line: 咳……要买点东西，还缺一点。
  - character: 萧薰儿
    parenthetical: 眨眨眼，愕然
    line: 钱？萧炎哥哥需要钱么？
  - character: 萧薰儿
    parenthetical: 晃了晃手中紫金卡
    line: 我还有一千多枚金币，够吗？如果不够的话……
  - character: 萧炎
    parenthetical: 欣喜点头，手悬在半空又收回
    line: 够了，够了……
  - character: 萧炎
    parenthetical: 拍胸口，郑重
    line: 放心吧，等以后我会把钱尽数的还你。
  - character: 萧薰儿
    parenthetical: 小嘴微撇，迅速收卡
    line: 谁稀罕你还呢……
  source:
    chapter: 10
    excerpt: 脚尖在山岩之上轻轻一点，萧薰儿宛如一只紫色蝴蝶一般……
  craft:
    objective: 萧炎需向萧薰儿借到足够购买药材的钱。
    conflict: 萧炎三年来首次开口向人借钱，羞耻感与自尊心形成内在阻力；萧薰儿虽愿相助，却以玩笑试探其真实心境。
    turn: 萧炎坦然接受借款并承诺归还，萧薰儿将象征身份的五纹紫金卡示出又收回，二人关系从单向守护转向双向托付。
    function: ADVANCE_PLOT
- id: S72
  heading:
    int_ext: 内
    location: 萧炎卧室
    time_of_day: 清晨
  summary: 清晨修炼后，萧炎整理行装准备出门；萧薰儿准时来访，交付存金卡，二人以轻松打趣消解昨夜借钱的微妙张力。
  action:
  - 晨光斜切窗棂，在床榻上铺开暖金。萧炎盘坐，双目紧闭，胸膛缓慢起伏。
  - 一股淡白气流肉眼可见地涌入他口鼻，肩颈肌肉随呼吸微微绷紧又松弛。
  - 他骤然睁眼，瞳中白芒一闪即逝。伸懒腰时脊椎发出细微脆响，脸上浮起迷醉笑意。
  - 他赤脚跳下床，活动手腕脚踝，换上干净灰袍。柜子拉开，小木匣‘咔’一声弹开——金光刺眼。
  - 门外传来清越嗓音。萧炎抓起匣子苦笑，推门而出。
  - 萧薰儿立于廊下，淡绿长裤裹着修长双腿，指尖绕着一缕发丝，笑意盈盈。
  dialogue:
  - character: 萧薰儿
    parenthetical: 轻灵，带笑
    line: 萧炎哥哥，还没起来？
  - character: 萧炎
    parenthetical: 摇头，无奈中透着宠溺
    line: 这丫头，来得真早。
  - character: 萧薰儿
    parenthetical: 递出黑色存金卡，指尖微翘
    line: 喏，你需要的东西。
  - character: 萧炎
    parenthetical: 吹口哨，挑眉
    line: 小妮子穿这么漂亮想干什么？难道和别人有约么？
  - character: 萧薰儿
    parenthetical: 眼眸弯成月牙，俏皮
    line: 是啊，是啊，这可是萧炎哥哥三年来第一次邀请我一起出去呢，薰儿可是很受宠若惊哦，当然要打扮得漂亮一点。
  source:
    chapter: 10
    excerpt: 清晨的阳光从窗户间射将进来，照在床榻之上盘腿修炼的少年身上……
  craft:
    objective: 萧炎确认资金到位并完成出发前准备，建立行动节奏。
    conflict: 萧炎需在家族众人注视下维持体面，而薰儿盛装赴约可能引发闲言，二人需以自然亲昵化解外界压力。
    turn: 萧炎用玩笑打破尴尬，薰儿以娇俏回应，二人关系从‘旧日羁绊’正式迈入‘当下共谋’阶段。
    function: REVEAL_CHARACTER
- id: S73
  heading:
    int_ext: 外
    location: 乌坦城主街
    time_of_day: 白天
  summary: 萧炎携薰儿初入乌坦城街市，少女活泼撒欢，少年从容应对族人异样目光，二人互动自然融洽，街头烟火气反衬其内心坚定。
  action:
  - 烈日灼烤青石板路，人流如织。异族商贩吆喝声、铁匠铺叮当声、孩童追逐嬉闹声混作一片。
  - 萧炎与萧薰儿并肩缓行。薰儿忽而拽住萧炎手腕，拉他扑向糖葫芦摊，指尖沾上一点糖霜。
  - 她仰头咬下一颗山楂，酸得眯眼，却笑着把竹签塞进萧炎手里。
  - 萧炎无奈接过，却见她已雀跃奔向隔壁香料铺，裙摆旋开一朵紫莲。
  - 途中数名萧家族人驻足侧目——有人皱眉，有人嗤笑，有人欲上前搭话却被薰儿一个淡笑止步。
  - 萧炎目不斜视，只将黑卡攥得更紧些。薰儿回头招手，额角沁汗，笑容毫无阴霾。
  dialogue:
  - character: 路人甲
    parenthetical: 压低声音，推同伴
    line: 那不是废柴萧炎？跟薰儿小姐一道逛街？
  - character: 路人乙
    parenthetical: 赶紧拉人走开
    line: 嘘……别瞎说，没见薰儿小姐笑得多开心？
  source:
    chapter: 10
    excerpt: 没有理会这些族人的神色，萧炎领着薰儿，直接出了家族……
  craft:
    objective: 萧炎借市井日常重建生活实感，向观众展示其走出阴影后的状态。
    conflict: 族人窃语与目光构成无形压力网，萧炎需以松弛姿态消解‘废物’标签，同时保护薰儿不被非议裹挟。
    turn: 萧炎不再回避他人注视，薰儿亦不因流言收敛亲昵——二人共同定义的新关系获得公共空间认证。
    function: REVEAL_CHARACTER
- id: S74
  heading:
    int_ext: 外
    location: 乌坦城东区药材铺门前
    time_of_day: 白天
  summary: 萧炎购置基础药材，资金大幅缩水；借询问魔核下落试探地下渠道，老药师隐晦指点，埋下后续黑市冲突伏笔。
  action:
